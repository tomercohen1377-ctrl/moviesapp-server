spring:
  application:
    name: moviesapp-server
  datasource:
    # Default profile = local/dev-friendly H2 in PostgreSQL compatibility mode.
    # Production overrides this with SPRING_DATASOURCE_* environment variables.
    url: jdbc:h2:mem:movies_app;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  flyway:
    enabled: true
  jpa:
    # Flyway owns schema creation. Hibernate only validates that entities and
    # database tables match, which prevents accidental production schema drift.
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.format_sql: true
      hibernate.show_sql: false
    open-in-view: false
  jackson:
    default-property-inclusion: non_null

server:
  # Railway / Fly / Render all inject PORT. Default to 8080 for local.
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: moviesapp-server
    description: Spring Boot backend for Movies-App favorites

# JWT bearer-token auth — see AuthController and JwtAuthFilter.
jwt:
  issuer: moviesapp-server
  # Default TTL is 24 hours. Production should set JWT_TTL_SECONDS lower
  # (e.g. 3600) so a stolen device only exposes one hour of tokens.
  ttl-seconds: ${JWT_TTL_SECONDS:86400}
  # Production: paste base64url-encoded PKCS#8 RSA private key here.
  private-key: ${JWT_PRIVATE_KEY:}
  public-key: ${JWT_PUBLIC_KEY:}

logging:
  level:
    org.hibernate.SQL: info
    com.tcohen.moviesapp.server: debug

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate

logging:
  level:
    org.hibernate.SQL: warn
    com.tcohen.moviesapp.server: info
